<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.45" stop-color="#101827"/>
      <stop offset="1" stop-color="#1B2735"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 140) rotate(35) scale(420 250)">
      <stop stop-color="#38BDF8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1270 360) rotate(145) scale(480 260)">
      <stop stop-color="#A78BFA" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>

    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#FFFFFF" fill-opacity="0.08"/>
    </pattern>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>
  <rect width="1600" height="500" fill="url(#glow1)"/>
  <rect width="1600" height="500" fill="url(#glow2)"/>
  <rect width="1600" height="500" fill="url(#grid)"/>
  <rect width="1600" height="500" fill="url(#dots)"/>
  <rect width="1600" height="500" filter="url(#grain)" opacity="0.28"/>

  <!-- CAD-style geometry -->
  <g opacity="0.16" stroke="#E2E8F0" stroke-width="2" fill="none">
    <path d="M1130 105 L1345 165 L1250 320 L1030 255 Z"/>
    <path d="M1130 105 L1030 255 L1088 390 L1308 448 L1250 320"/>
    <path d="M1345 165 L1308 448"/>
    <circle cx="1190" cy="260" r="52"/>
    <circle cx="1190" cy="260" r="18"/>
    <path d="M1030 255 L1250 320"/>
    <path d="M1088 390 L1308 448"/>
  </g>

  <!-- Flow/trajectory lines -->
  <g opacity="0.24" stroke="#38BDF8" stroke-width="3" fill="none">
    <path d="M80 390 C230 300, 310 390, 455 292 S730 210, 880 300" />
    <path d="M40 430 C220 345, 335 435, 500 335 S740 255, 925 345" opacity="0.6"/>
    <path d="M120 350 C260 255, 355 345, 495 250 S685 165, 835 250" opacity="0.45"/>
  </g>

  <!-- Center card -->
  <g filter="url(#shadow)">
    <rect x="110" y="90" width="890" height="320" rx="32" fill="#0F172A" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.14"/>
  </g>

  <text x="160" y="180" fill="#F8FAFC" font-size="62" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif">
    Armaan Mahajan
  </text>
  <text x="164" y="230" fill="#BAE6FD" font-size="27" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">
    Mechanical Engineering @ IIT Roorkee
  </text>
  <text x="164" y="292" fill="#CBD5E1" font-size="34" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">
    CAD Automation · Robotics · Manufacturing Systems
  </text>
  <text x="164" y="338" fill="#94A3B8" font-size="24" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">
    Design Intent Extraction · Autonomous Systems · Operations Analytics
  </text>

  <g transform="translate(164 365)">
    <rect x="0" y="0" width="168" height="38" rx="19" fill="#38BDF8" fill-opacity="0.14" stroke="#38BDF8" stroke-opacity="0.45"/>
    <text x="20" y="25" fill="#E0F2FE" font-size="16" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">CAD / BRep</text>

    <rect x="188" y="0" width="145" height="38" rx="19" fill="#A78BFA" fill-opacity="0.14" stroke="#A78BFA" stroke-opacity="0.45"/>
    <text x="210" y="25" fill="#F3E8FF" font-size="16" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">ROS / SLAM</text>

    <rect x="353" y="0" width="198" height="38" rx="19" fill="#34D399" fill-opacity="0.12" stroke="#34D399" stroke-opacity="0.42"/>
    <text x="375" y="25" fill="#D1FAE5" font-size="16" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">Operations Analytics</text>
  </g>
</svg>
